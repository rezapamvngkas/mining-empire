<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Mining Empire</title>
<meta name="theme-color" content="#150F0A" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mining Empire" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap');
  html, body { margin:0; padding:0; background:#0B0805; overflow:hidden; height:100%; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  #root { height:100%; }
  ::-webkit-scrollbar { width:0px; height:0px; }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.9); opacity: 0; }
    15% { opacity: 1; transform: translateY(-6px) scale(1); }
    80% { opacity: 1; }
    100% { transform: translateY(-70px) scale(1); opacity: 0; }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------------------------------- ICONS (emoji, no deps) ---------------------------------- */
const ICON = {
  coins: "🪙", gem: "💎", zap: "⚡", star: "⭐", backpack: "🎒", store: "🏪",
  hammer: "🔨", users: "👥", shield: "🛡️", sparkles: "✨", x: "✕", trendUp: "📈",
  flame: "🔥", plus: "➕", gift: "🎁", clock: "⏱️", swords: "⚔️", mountain: "⛰️",
  trophy: "🏆", award: "🥇", check: "✓",
};
function Icon({ name, size = 16, color }) {
  return <span style={{ fontSize: size, color, lineHeight: 1, display: "inline-block" }}>{ICON[name]}</span>;
}

/* ---------------------------------- DATA ---------------------------------- */
const REGIONS = [
  { id: "meadow", name: "Green Meadow", subtitle: "Tutorial Grounds", unlock: "Free", maxDepth: 500, materials: ["Stone", "Wood", "Copper", "Coal"], accent: "#8BAE5B", glow: "#C9E4A0" },
  { id: "mountain", name: "Rocky Mountain", subtitle: "Iron Foothills", unlock: "50,000 Coins", maxDepth: 2000, materials: ["Iron", "Quartz", "Coal", "Granite"], accent: "#9C8B7A", glow: "#D8C7B0" },
  { id: "crystal", name: "Crystal Cave", subtitle: "Gem-lit Hollows", unlock: "300,000 Coins", maxDepth: 6000, materials: ["Crystal", "Silver", "Gold", "Ruby"], accent: "#4FC3C7", glow: "#9FEAEE" },
  { id: "volcano", name: "Volcano Core", subtitle: "Molten Depths", unlock: "2,000,000 Coins", maxDepth: 15000, materials: ["Obsidian", "Platinum", "Fire Crystal"], accent: "#D9603B", glow: "#F5A87A" },
  { id: "ruins", name: "Sand Ruins", subtitle: "Buried Kingdom", unlock: "Legendary Key", maxDepth: 9999, materials: ["Relic", "Ancient Scroll", "Artifact", "Blueprint"], accent: "#D9A441", glow: "#F2D48A" },
];

const PICKAXES = [
  { name: "Wood", power: 1, crit: 5, luck: 2, color: "#8B6F47" },
  { name: "Stone", power: 3, crit: 6, luck: 3, color: "#9B9B93" },
  { name: "Copper", power: 5, crit: 7, luck: 4, color: "#C97A4A" },
  { name: "Bronze", power: 6, crit: 8, luck: 5, color: "#B08D57" },
  { name: "Iron", power: 8, crit: 10, luck: 6, color: "#A8A9AD" },
  { name: "Steel", power: 12, crit: 12, luck: 7, color: "#7C8B9A" },
  { name: "Silver", power: 18, crit: 14, luck: 9, color: "#C7CCD1" },
  { name: "Gold", power: 26, crit: 16, luck: 12, color: "#E8B34C" },
  { name: "Platinum", power: 38, crit: 18, luck: 15, color: "#D8D8E0" },
  { name: "Diamond", power: 55, crit: 22, luck: 18, color: "#7FD8E8" },
  { name: "Mythic", power: 90, crit: 26, luck: 22, color: "#B37FE8" },
  { name: "Ancient", power: 150, crit: 30, luck: 28, color: "#E8A45C" },
  { name: "Void", power: 250, crit: 35, luck: 35, color: "#7C5CE8" },
];

const LOOT_TABLE = [
  { name: "Stone", rarity: "Common", color: "#B7B4AC", weight: 26 },
  { name: "Ore", rarity: "Common", color: "#C08A57", weight: 22 },
  { name: "Nothing", rarity: "", color: "#6B665D", weight: 20 },
  { name: "Gemstone", rarity: "Rare", color: "#4FC3C7", weight: 12 },
  { name: "Ancient Fossil", rarity: "Rare", color: "#8FA05C", weight: 6 },
  { name: "Relic", rarity: "Epic", color: "#B37FE8", weight: 5 },
  { name: "Blueprint", rarity: "Epic", color: "#E8B34C", weight: 3 },
  { name: "Lucky Chest", rarity: "Legendary", color: "#F2C744", weight: 2 },
  { name: "Meteor Shard", rarity: "Legendary", color: "#E85C5C", weight: 1 },
];

const TALENTS = [
  { id: "luckyMiner", name: "Lucky Miner", desc: "Rare ore chance", icon: "star" },
  { id: "deepBreaker", name: "Deep Breaker", desc: "Damage vs hard rock", icon: "swords" },
  { id: "criticalMiner", name: "Critical Miner", desc: "Instant break chance", icon: "zap" },
  { id: "efficientMiner", name: "Efficient Miner", desc: "Less stamina used", icon: "flame" },
  { id: "treasureHunter", name: "Treasure Hunter", desc: "Hidden room chance", icon: "gift" },
  { id: "gemHunter", name: "Gem Hunter", desc: "Gemstone discovery", icon: "gem" },
  { id: "merchant", name: "Merchant", desc: "Selling price", icon: "trendUp" },
  { id: "explorer", name: "Explorer", desc: "Blueprint chance", icon: "award" },
];

const SELL_PRICE = {
  Stone: 4, Ore: 12, Gemstone: 85, "Ancient Fossil": 140, Relic: 260,
  Blueprint: 400, "Lucky Chest": 0, "Meteor Shard": 0,
};

const XP_PER_LEVEL = 6000;
const SAVE_KEY = "mining-empire-save-v1";
const fmt = (n) => Math.round(n).toLocaleString("en-US");

function weightedLoot(luck) {
  const pool = LOOT_TABLE.map((l) => {
    let w = l.weight;
    if (l.rarity && l.rarity !== "Common") w *= 1 + luck / 60;
    if (l.name === "Nothing") w = Math.max(4, w - luck / 4);
    return { ...l, w };
  });
  const total = pool.reduce((s, l) => s + l.w, 0);
  let r = Math.random() * total;
  for (const l of pool) { if (r < l.w) return l; r -= l.w; }
  return pool[0];
}
function regionEmoji(id) {
  return { meadow: "🌾", mountain: "⛰️", crystal: "💎", volcano: "🌋", ruins: "🏛️" }[id] || "⛏️";
}

/* ---------------------------------- APP ---------------------------------- */
function MiningEmpire() {
  const [tab, setTab] = useState("dig");
  const [level, setLevel] = useState(24);
  const [xp, setXp] = useState(3450);
  const [coins, setCoins] = useState(128600);
  const [gems, setGems] = useState(2450);
  const [maxStamina, setMaxStamina] = useState(100);
  const [stamina, setStamina] = useState(72);
  const [progress, setProgress] = useState(68.4);
  const [depth, setDepth] = useState(1250);
  const [regionIndex, setRegionIndex] = useState(4);
  const [pickaxeIndex, setPickaxeIndex] = useState(4);
  const [inventory, setInventory] = useState({});
  const [talentPoints, setTalentPoints] = useState(3);
  const [talents, setTalents] = useState({});
  const [autoDig, setAutoDig] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [showRegionModal, setShowRegionModal] = useState(false);
  const [digPulse, setDigPulse] = useState(false);
  const [saveNote, setSaveNote] = useState("");
  const [loaded, setLoaded] = useState(false);

  const toastId = useRef(0);
  const saveTimer = useRef(null);

  const region = REGIONS[regionIndex];
  const pickaxe = PICKAXES[pickaxeIndex];
  const damage = pickaxe.power * 10 + (talents.deepBreaker || 0) * 8;
  const crit = pickaxe.crit + (talents.criticalMiner || 0) * 2;
  const luck = pickaxe.luck + (talents.luckyMiner || 0) * 2;
  const staminaCost = Math.max(2, 5 - (talents.efficientMiner || 0));

  useEffect(() => {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        setLevel(d.level ?? 24); setXp(d.xp ?? 3450); setCoins(d.coins ?? 128600);
        setGems(d.gems ?? 2450); setMaxStamina(d.maxStamina ?? 100); setStamina(d.stamina ?? 72);
        setProgress(d.progress ?? 68.4); setDepth(d.depth ?? 1250); setRegionIndex(d.regionIndex ?? 4);
        setPickaxeIndex(d.pickaxeIndex ?? 4); setInventory(d.inventory ?? {});
        setTalentPoints(d.talentPoints ?? 3); setTalents(d.talents ?? {});
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          level, xp, coins, gems, maxStamina, stamina, progress, depth,
          regionIndex, pickaxeIndex, inventory, talentPoints, talents,
        }));
        setSaveNote("Saved"); setTimeout(() => setSaveNote(""), 1200);
      } catch (e) {}
    }, 700);
    return () => clearTimeout(saveTimer.current);
  }, [loaded, level, xp, coins, gems, maxStamina, stamina, progress, depth, regionIndex, pickaxeIndex, inventory, talentPoints, talents]);

  useEffect(() => {
    const t = setInterval(() => setStamina((s) => Math.min(maxStamina, s + 1)), 3000);
    return () => clearInterval(t);
  }, [maxStamina]);

  const pushToast = useCallback((text, color) => {
    const id = ++toastId.current;
    setToasts((t) => [...t, { id, text, color, left: 30 + Math.random() * 40 }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 1500);
  }, []);

  const addXp = useCallback((amount) => {
    setXp((prevXp) => {
      let nx = prevXp + amount;
      while (nx >= XP_PER_LEVEL) {
        nx -= XP_PER_LEVEL;
        setLevel((l) => l + 1);
        setMaxStamina((m) => m + 5);
        setStamina((s) => s + 5);
        setTalentPoints((tp) => tp + 1);
        pushToast("LEVEL UP!", "#F2C744");
      }
      return nx;
    });
  }, [pushToast]);

  const dig = useCallback(() => {
    setStamina((prevStamina) => {
      if (prevStamina < staminaCost) { pushToast("Out of stamina", "#E85C5C"); return prevStamina; }
      return prevStamina - staminaCost;
    });
    setDigPulse(true); setTimeout(() => setDigPulse(false), 180);
    const isCrit = Math.random() * 100 < crit;
    const gain = (damage / 40) * (isCrit ? 2 : 1);
    if (isCrit) pushToast("CRITICAL!", "#F2C744");
    const loot = weightedLoot(luck);
    if (loot.name !== "Nothing") {
      const label = (isCrit ? "+2 " : "+1 ") + loot.name;
      pushToast(label, loot.color);
      setInventory((inv) => ({ ...inv, [loot.name]: (inv[loot.name] || 0) + (isCrit ? 2 : 1) }));
      if (loot.name === "Lucky Chest") {
        const bonus = 500 + Math.floor(Math.random() * 1500);
        setCoins((c) => c + bonus);
        pushToast("+" + fmt(bonus) + " Coins", "#E8B34C");
      }
    }
    addXp(3 + Math.floor(Math.random() * 6));
    setCoins((c) => c + Math.floor(2 + damage / 50));
    setProgress((p) => {
      const np = p + gain;
      if (np >= 100) {
        setDepth((d) => d + Math.floor(50 + Math.random() * 100));
        pushToast("Layer cleared!", "#7FD8E8");
        const bonus = 300 + Math.floor(Math.random() * 900);
        setCoins((c) => c + bonus);
        return 0;
      }
      return np;
    });
  }, [staminaCost, crit, damage, luck, addXp, pushToast]);

  useEffect(() => {
    if (!autoDig) return;
    const t = setInterval(() => { setStamina((s) => { if (s >= staminaCost) dig(); return s; }); }, 1100);
    return () => clearInterval(t);
  }, [autoDig, dig, staminaCost]);

  const sell = (mat, qty) => {
    const price = SELL_PRICE[mat] || 0;
    if (!price || !inventory[mat]) return;
    const sellQty = Math.min(qty, inventory[mat]);
    setCoins((c) => c + sellQty * price);
    setInventory((inv) => ({ ...inv, [mat]: inv[mat] - sellQty }));
  };

  const nextPickaxe = PICKAXES[pickaxeIndex + 1];
  const craftCost = nextPickaxe ? { coins: (pickaxeIndex + 1) * 8000, ore: (pickaxeIndex + 1) * 12 } : null;
  const canCraft = nextPickaxe && coins >= craftCost.coins && (inventory.Ore || 0) >= craftCost.ore;
  const craft = () => {
    if (!canCraft) return;
    setCoins((c) => c - craftCost.coins);
    setInventory((inv) => ({ ...inv, Ore: inv.Ore - craftCost.ore }));
    setPickaxeIndex((i) => i + 1);
    pushToast("Crafted " + nextPickaxe.name + " Pickaxe!", nextPickaxe.color);
  };

  const spendTalent = (id) => {
    if (talentPoints <= 0) return;
    if ((talents[id] || 0) >= 5) return;
    setTalents((t) => ({ ...t, [id]: (t[id] || 0) + 1 }));
    setTalentPoints((p) => p - 1);
  };

  const ownedMaterials = Object.entries(inventory).filter(([, v]) => v > 0);
  const partyPower = Math.round(damage * 0.4);

  return (
    <div style={styles.appShell}>
      <div style={styles.phone}>
        <div style={styles.topBar}>
          <div style={styles.avatarWrap}>
            <div style={styles.avatar}>⛏️</div>
            <div style={styles.levelBadge}>{level}</div>
          </div>
          <div style={{ flex: 1, marginLeft: 10 }}>
            <div style={styles.xpTrack}><div style={{ ...styles.xpFill, width: (xp / XP_PER_LEVEL) * 100 + "%" }} /></div>
            <div style={styles.xpLabel}>{fmt(xp)} / {fmt(XP_PER_LEVEL)} XP</div>
          </div>
          <div style={styles.currencyPill}><Icon name="coins" size={14} color="#F2C744" /><span style={styles.currencyText}>{fmt(coins)}</span></div>
          <div style={styles.currencyPill}><Icon name="gem" size={14} color="#7FD8E8" /><span style={styles.currencyText}>{fmt(gems)}</span></div>
        </div>

        <div style={styles.content}>
          {tab === "dig" && (
            <DigTab region={region} depth={depth} progress={progress} stamina={stamina} maxStamina={maxStamina}
              staminaCost={staminaCost} damage={damage} crit={crit} luck={luck} pickaxe={pickaxe} toasts={toasts}
              digPulse={digPulse} autoDig={autoDig} setAutoDig={setAutoDig} onDig={dig}
              onChangeRegion={() => setShowRegionModal(true)} />
          )}
          {tab === "inventory" && <InventoryTab ownedMaterials={ownedMaterials} />}
          {tab === "market" && <MarketTab ownedMaterials={ownedMaterials} sell={sell} />}
          {tab === "craft" && (
            <CraftTab pickaxeIndex={pickaxeIndex} nextPickaxe={nextPickaxe} craftCost={craftCost}
              canCraft={canCraft} craft={craft} inventory={inventory} coins={coins} />
          )}
          {tab === "party" && <PartyTab partyPower={partyPower} pickaxe={pickaxe} />}
          {tab === "profile" && (
            <ProfileTab level={level} talentPoints={talentPoints} talents={talents} spendTalent={spendTalent} pickaxe={pickaxe} />
          )}
        </div>

        {saveNote && <div style={styles.saveNote}>{saveNote}</div>}

        <div style={styles.bottomNav}>
          <NavBtn iconName="mountain" label="Dig" active={tab === "dig"} onClick={() => setTab("dig")} />
          <NavBtn iconName="backpack" label="Inventory" active={tab === "inventory"} onClick={() => setTab("inventory")} badge={ownedMaterials.length || null} />
          <NavBtn iconName="store" label="Market" active={tab === "market"} onClick={() => setTab("market")} />
          <NavBtn iconName="hammer" label="Craft" active={tab === "craft"} onClick={() => setTab("craft")} badge={canCraft ? "!" : null} />
          <NavBtn iconName="users" label="Party" active={tab === "party"} onClick={() => setTab("party")} />
          <NavBtn iconName="shield" label="Profile" active={tab === "profile"} onClick={() => setTab("profile")} badge={talentPoints > 0 ? talentPoints : null} />
        </div>
      </div>

      {showRegionModal && (
        <RegionModal regions={REGIONS} current={regionIndex} onSelect={(i) => { setRegionIndex(i); setProgress(0); setShowRegionModal(false); }} onClose={() => setShowRegionModal(false)} />
      )}
    </div>
  );
}

function DigTab({ region, depth, progress, stamina, maxStamina, staminaCost, damage, crit, luck, pickaxe, toasts, digPulse, autoDig, setAutoDig, onDig, onChangeRegion }) {
  return (
    <div>
      <button onClick={onChangeRegion} style={styles.locationCard}>
        <div style={{ ...styles.locationIconBox, background: "linear-gradient(150deg, " + region.accent + ", #2A2018)" }}>
          <span style={{ fontSize: 26 }}>{regionEmoji(region.id)}</span>
        </div>
        <div style={{ flex: 1, textAlign: "left" }}>
          <div style={styles.locationEyebrow}>LOCATION</div>
          <div style={styles.locationName}>{region.name}</div>
          <div style={styles.locationDepth}>Best Depth {fmt(depth)}M</div>
        </div>
        <div style={styles.changeBtn}>CHANGE</div>
      </button>

      <div style={{ ...styles.stage, background: "radial-gradient(circle at 50% 35%, " + region.glow + "22, transparent 60%), linear-gradient(180deg, #241A12, #150F0A)" }}>
        <div style={{ ...styles.stageGlowRing, background: "radial-gradient(circle, " + region.accent + "33, transparent 70%)" }} />
        <div style={{ ...styles.pickaxeGlyph, transform: digPulse ? "scale(0.88) rotate(-6deg)" : "scale(1) rotate(-2deg)", transition: "transform 0.12s ease", filter: "drop-shadow(0 0 18px " + pickaxe.color + "99)" }}>⛏️</div>
        {toasts.map((t) => (
          <div key={t.id} style={{ ...styles.toast, left: t.left + "%", color: t.color, animation: "floatUp 1.5s ease-out forwards" }}>{t.text}</div>
        ))}
      </div>

      <div style={styles.progressCard}>
        <div style={styles.progressLabelRow}><span style={styles.progressLabel}>MINING PROGRESS</span><span style={styles.progressPct}>{progress.toFixed(1)}%</span></div>
        <div style={styles.progressTrack}><div style={{ ...styles.progressFill, width: Math.min(100, progress) + "%", background: "linear-gradient(90deg, " + region.accent + ", " + region.glow + ")" }} /></div>
      </div>

      <div style={styles.statsGrid}>
        <StatBox iconName="swords" label="DAMAGE" value={fmt(damage)} color="#E85C5C" barPct={Math.min(100, damage / 3)} />
        <StatBox iconName="star" label="CRITICAL" value={Math.round(crit) + "%"} color="#F2C744" barPct={crit} />
        <StatBox iconName="zap" label="STAMINA" value={stamina + "/" + maxStamina} color="#5CC2E8" barPct={(stamina / maxStamina) * 100} />
        <StatBox iconName="gem" label="LUCK" value={Math.round(luck) + "%"} color="#B37FE8" barPct={luck * 2} />
      </div>

      <div style={styles.actionsRow}>
        <div style={styles.staminaCol}>
          <div style={styles.staminaTop}><Icon name="zap" size={16} color="#F2C744" /><span style={styles.staminaText}>{stamina}/{maxStamina}</span></div>
          <div style={styles.staminaSub}>−{staminaCost} per swing</div>
        </div>
        <button onClick={onDig} disabled={stamina < staminaCost} style={{ ...styles.digButton, opacity: stamina < staminaCost ? 0.45 : 1, transform: digPulse ? "scale(0.96)" : "scale(1)" }}>
          <Icon name="mountain" size={22} /><span style={{ marginLeft: 8 }}>DIG</span>
        </button>
        <button onClick={() => setAutoDig((a) => !a)} style={{ ...styles.autoBtn, background: autoDig ? "linear-gradient(160deg,#E8B34C,#B5822C)" : "linear-gradient(160deg,#3A2F22,#241C14)", borderColor: autoDig ? "#F2C744" : "#4A3B28" }}>
          <Icon name="clock" size={16} color={autoDig ? "#241C14" : "#D9C29A"} />
          <span style={{ color: autoDig ? "#241C14" : "#D9C29A", fontWeight: 700, fontSize: 12, marginTop: 2 }}>{autoDig ? "AUTO ON" : "AUTO DIG"}</span>
        </button>
      </div>
    </div>
  );
}

function StatBox({ iconName, label, value, color, barPct }) {
  return (
    <div style={styles.statBox}>
      <div style={styles.statTopRow}><Icon name={iconName} size={14} color={color} /><span style={styles.statLabel}>{label}</span></div>
      <div style={styles.statValue}>{value}</div>
      <div style={styles.statBarTrack}><div style={{ ...styles.statBarFill, width: Math.min(100, Math.max(4, barPct)) + "%", background: color }} /></div>
    </div>
  );
}

function InventoryTab({ ownedMaterials }) {
  return (
    <div>
      <SectionHeader title="Inventory" subtitle={ownedMaterials.length + " material types collected"} />
      {ownedMaterials.length === 0 ? <EmptyState text="Nothing collected yet. Start digging to fill your sack." /> : (
        <div style={styles.invGrid}>
          {ownedMaterials.map(([name, qty]) => {
            const item = LOOT_TABLE.find((l) => l.name === name);
            return (
              <div key={name} style={{ ...styles.invCard, borderColor: (item?.color || "#4A3B28") + "88" }}>
                <div style={{ ...styles.invSwatch, background: item?.color || "#8B6F47" }} />
                <div style={styles.invName}>{name}</div>
                <div style={styles.invQty}>×{fmt(qty)}</div>
                {item?.rarity && <div style={{ ...styles.rarityTag, color: item.color }}>{item.rarity}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MarketTab({ ownedMaterials, sell }) {
  const sellable = ownedMaterials.filter(([n]) => SELL_PRICE[n]);
  return (
    <div>
      <SectionHeader title="Player Market" subtitle="Prices set by supply & demand" />
      {sellable.length === 0 ? <EmptyState text="You have nothing worth selling right now." /> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {sellable.map(([name, qty]) => {
            const item = LOOT_TABLE.find((l) => l.name === name);
            const price = SELL_PRICE[name];
            return (
              <div key={name} style={styles.marketRow}>
                <div style={{ ...styles.invSwatch, background: item?.color || "#8B6F47", width: 34, height: 34 }} />
                <div style={{ flex: 1, marginLeft: 10 }}>
                  <div style={styles.invName}>{name}</div>
                  <div style={styles.marketSub}>×{fmt(qty)} owned · {price} 🪙 each</div>
                </div>
                <button style={styles.sellBtn} onClick={() => sell(name, qty)}>SELL ALL</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CraftTab({ pickaxeIndex, nextPickaxe, craftCost, canCraft, craft, inventory, coins }) {
  return (
    <div>
      <SectionHeader title="Pickaxe Forge" subtitle="Every tier is crafted, never bought" />
      <div style={styles.chainRow}>
        {PICKAXES.map((p, i) => (
          <div key={p.name} style={{ display: "flex", alignItems: "center" }}>
            <div style={{ ...styles.chainNode, borderColor: p.color, background: i <= pickaxeIndex ? p.color + "33" : "transparent", opacity: i <= pickaxeIndex ? 1 : 0.35 }}>
              <div style={{ ...styles.chainDot, background: p.color }} />
            </div>
            {i < PICKAXES.length - 1 && <div style={{ ...styles.chainLine, opacity: i < pickaxeIndex ? 1 : 0.25 }} />}
          </div>
        ))}
      </div>
      <div style={styles.chainLabel}>Current: <b style={{ color: PICKAXES[pickaxeIndex].color }}>{PICKAXES[pickaxeIndex].name} Pickaxe</b></div>
      {nextPickaxe ? (
        <div style={{ ...styles.craftCard, borderColor: nextPickaxe.color + "88" }}>
          <div style={styles.craftTitleRow}>
            <div style={{ ...styles.invSwatch, background: nextPickaxe.color, width: 40, height: 40 }} />
            <div style={{ marginLeft: 10 }}>
              <div style={styles.craftTitle}>{nextPickaxe.name} Pickaxe</div>
              <div style={styles.craftSub}>Power {nextPickaxe.power} · Crit +{nextPickaxe.crit}% · Luck +{nextPickaxe.luck}%</div>
            </div>
          </div>
          <div style={styles.reqRow}>
            <ReqPill ok={coins >= craftCost.coins} label={fmt(craftCost.coins) + " Coins"} />
            <ReqPill ok={(inventory.Ore || 0) >= craftCost.ore} label={craftCost.ore + " Ore (have " + (inventory.Ore || 0) + ")"} />
          </div>
          <button onClick={craft} disabled={!canCraft} style={{ ...styles.craftBtn, opacity: canCraft ? 1 : 0.4 }}>
            <Icon name="hammer" size={16} /><span style={{ marginLeft: 8 }}>{canCraft ? "CRAFT UPGRADE" : "MISSING MATERIALS"}</span>
          </button>
        </div>
      ) : <EmptyState text="You've forged the ultimate Void Pickaxe. Nothing left to craft." />}
    </div>
  );
}

function ReqPill({ ok, label }) {
  return (
    <div style={{ ...styles.reqPill, borderColor: ok ? "#6FBF6F" : "#D9603B", color: ok ? "#9BE39B" : "#F0A07E" }}>
      <Icon name={ok ? "check" : "x"} size={12} /><span style={{ marginLeft: 5 }}>{label}</span>
    </div>
  );
}

function ProfileTab({ level, talentPoints, talents, spendTalent, pickaxe }) {
  return (
    <div>
      <SectionHeader title="Profile" subtitle={"Level " + level + " · " + pickaxe.name + " Pickaxe"} />
      <div style={styles.talentPointsCard}>
        <Icon name="trophy" size={18} color="#F2C744" />

      </div>

        {TALENTS.map((t) => {
          const val = talents[t.id] || 0;
          return (

                <div style={styles.invName}>{t.name}</div>
                <div style={styles.marketSub}>{t.desc}</div>

function RegionModal({ regions, current, onSelect, onClose }) {
  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalSheet} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: "62vh", overflowY: "auto" }}>

function SectionHeader({ title, subtitle }) {
